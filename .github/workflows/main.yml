name: Website Update Checker

on:
  schedule:
    # 3か月ごと（1, 4, 7, 10月）の1日 午前9時(日本時間)に実行
    - cron: '0 0 1 1,4,7,10 *'
  workflow_dispatch: # ボタンを押して手動でテストするための設定

jobs:
  test-notification:
    runs-on: ubuntu-latest
    steps:
      - name: Force Update Notification Test
        run: |
          echo "これはテストです。強制的に通知（エラー）を送ります"
          exit 1 # ここで強制的に「赤いバツ」を出す
