name: Journal Update Checker

on:
  schedule:
    - cron: '0 0 1 1,4,7,10 *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check Journal Issue
        id: check_site
        run: |
          URL="https://www.degruyterbrill.com/journal/key/hzhz/html"
          CURRENT_ISSUE=$(curl -sL $URL | grep -oP 'Volume\s+\d+:\s+Issue\s+\d+' | head -n 1)
          echo "Current Issue found: $CURRENT_ISSUE"
          echo "$CURRENT_ISSUE" > last_issue.txt

      - name: Save Status
        run: |
          git config user.name "github-actions"
          git config user.email "action@github.com"
          git add last_issue.txt
          # 変更がある場合のみコミットし、ない場合はエラーにせず終了する
          git commit -m "Update journal status" || exit 0
          git push
