name: Journal Update Checker

on:
  schedule:
    # 3か月ごと（1, 4, 7, 10月）の1日 午前9時(日本時間)に実行
    - cron: '0 0 1 1,4,7,10 *'
  workflow_dispatch: # 手動でいつでもチェックできるボタン

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check Journal Issue
        id: check_site
        run: |
          URL="https://www.degruyterbrill.com/journal/key/hzhz/html"
          # 最新の号数を取得
          CURRENT_ISSUE=$(curl -sL $URL | grep -oP 'Volume\s+\d+:\s+Issue\s+\d+' | head -n 1)
          echo "Current Issue: $CURRENT_ISSUE"

          # 前回のデータと比較
          if [ -f last_issue.txt ]; then
            LAST_ISSUE=$(cat last_issue.txt)
            if [ "$CURRENT_ISSUE" != "$LAST_ISSUE" ]; then
              echo "CHANGED=true" >> $GITHUB_ENV
              echo "Site has been updated!"
            fi
          fi
          
          # 今回の号数をファイルに書き込む（次回の比較用）
          echo "$CURRENT_ISSUE" > last_issue.txt

      - name: Update last_issue.txt in Repository
        if: env.CHANGED == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "action@github.com"
          git add last_issue.txt
          git commit -m "Update last_issue.txt to $CURRENT_ISSUE"
          git push

      - name: Notify via Email (Force Fail)
        if: env.CHANGED == 'true'
        run: |
          echo "【通知】Historische Zeitschrift の最新刊が更新されました！"
          exit 1 # わざとエラーにしてGitHubから通知メールを飛ばす
