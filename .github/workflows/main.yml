name: Multiple Journals Update Checker

on:
  schedule:
    - cron: '0 0 1 1,4,7,10 *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: pip install requests

      - name: Check Journals via Crossref API
        id: check_site
        run: |
          cat << 'EOF' > check_issues.py
          import requests
          import sys
          import os
          import json
          import time

          journals = {
              "0018-2613": "Historische Zeitschrift",
              "0031-2746": "Past & Present",
              "0071-9706": "Frühmittelalterliche Studien",
              "0035-4473": "Rheinische Vierteljahrsblätter",
              "0170-2025": "Jahrbuch für westdeutsche Landesgeschichte",
              "0340-0174": "Zeitschrift für Historische Forschung",
              "0066-6432": "Archiv für mittelrheinische Kirchengeschichte",
              "0006-4408": "Blätter für Deutsche Landesgeschichte",
              "1867-6448": "Francia",
              "1615-7885": "Europa im Mittelalter",
              "0452-490X": "Vorträge und Forschungen"
          }

          state_file = "last_issues.json"
          
          if os.path.exists(state_file):
              with open(state_file, "r", encoding="utf-8") as f:
                  try:
                      last_state = json.load(f)
                  except:
                      last_state = {}
          else:
              last_state = {}

          new_state = {}
          updates = []

          # Polite Pool用のメールアドレスに書き換えてください
          headers = {
              "User-Agent": "GitHubActions-JournalChecker/1.1 (mailto:furukawama@gmail.com)"
          }
          
          url = "https://api.crossref.org/works"
          
          for issn, title in journals.items():
              params = {"filter": f"issn:{issn}", "sort": "published", "order": "desc", "select": "volume,issue,title", "rows": 5}
              
              try:
                  response = requests.get(url, params=params, headers=headers, timeout=15)
                  response.raise_for_status()
                  items = response.json().get("message", {}).get("items", [])
                  
                  if not items:
                      fallback_params = {
                          "query.container-title": title,
                          "sort": "published",
                          "order": "desc",
                          "select": "volume,issue,title",
                          "rows": 5
                      }
                      response = requests.get(url, params=fallback_params, headers=headers, timeout=15)
                      items = response.json().get("message", {}).get("items", [])
                  
                  latest_issue = None
                  if items:
                      item = items[0]
                      vol = item.get("volume")
                      iss = item.get("issue")
                      title_list = item.get("title", [])
                      item_title = title_list[0] if title_list else "No Title"
                      
                      if vol and iss:
                          latest_issue = f"Volume {vol}: Issue {iss}"
                      elif vol:
                          latest_issue = f"Volume {vol}"
                      else:
                          short_title = item_title[:60] + "..." if len(item_title) > 60 else item_title
                          latest_issue = f"最新: {short_title}"
                  
                  if latest_issue:
                      new_state[issn] = latest_issue
                      if last_state.get(issn) != latest_issue:
                          updates.append((title, issn, latest_issue))
                  else:
                      new_state[issn] = "データなし"
                      
              except Exception as e:
                  new_state[issn] = f"取得エラー"
              time.sleep(2)

          with open(state_file, "w", encoding="utf-8") as f:
              json.dump(new_state, f, ensure_ascii=False, indent=2)

          summary_file = os.getenv('GITHUB_STEP_SUMMARY')
          with open(summary_file, "a", encoding="utf-8") as f:
              f.write("### 📚 監視ジャーナル・叢書 最新ステータス\n\n")
              
              if updates:
                  env_file = os.getenv('GITHUB_ENV')
                  with open(env_file, "a", encoding="utf-8") as env_f:
                      env_f.write("CHANGED=true\n")
                  
                  # 🍎 Apple Watch(Pushover)用の短いメッセージファイルを作成
                  with open("pushover_msg.txt", "w", encoding="utf-8") as msg_f:
                      for title, issn, new in updates:
                          # Watchの画面に合わせて少し短く整形
                          short_title = title[:25] + "..." if len(title) > 25 else title
                          msg_f.write(f"📌 {short_title}\n{new}\n\n")

                  f.write("#### 📢 以下の更新・新規取得がありました！\n")
                  for title, issn, new in updates:
                      f.write(f"- **{title}** (`{issn}`)\n  - 新着: {new}\n")
                  f.write("\n---\n")
              else:
                  f.write("*今回は新しい更新はありませんでした。*\n\n---\n")
                  
              f.write("#### 🔍 全11誌の現在の取得状況\n")
              for issn, title in journals.items():
                  current = new_state.get(issn, "Unknown")
                  mark = "🆕" if any(u[1] == issn for u in updates) else "✔️"
                  if current == "データなし" or current == "取得エラー": mark = "⚠️"
                  f.write(f"- {mark} **{title}**: {current}\n")
          EOF
          
          python check_issues.py

      - name: Update Repository
        if: env.CHANGED == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "action@github.com"
          git add last_issues.json
          git commit -m "Update multiple journal issues"
          git push

      - name: Notify via Pushover (Apple Watch)
        if: env.CHANGED == 'true'
        run: |
          # 作成したApple Watch用メッセージを読み込む
          MESSAGE=$(cat pushover_msg.txt)
          
          # Pushover API を叩いて手首に直接通知を送る
          curl -s \
            --form-string "token=${{ secrets.PUSHOVER_API_TOKEN }}" \
            --form-string "user=${{ secrets.PUSHOVER_USER_KEY }}" \
            --form-string "title=📚 新刊アップデート" \
            --form-string "message=${MESSAGE}" \
            https://api.pushover.net/1/messages.json
            
          # ※通知がPushover経由になったので、エラー(exit 1)でGitHubメールを飛ばす必要はなくなりました。
