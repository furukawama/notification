name: Journal Update Checker (API Version)

on:
  schedule:
    - cron: '0 0 1 1,4,7,10 *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: pip install requests

      - name: Check Journal Issue via Crossref API
        id: check_site
        run: |
          cat << 'EOF' > check_issue.py
          import requests
          import sys
          import os

          # Historische Zeitschrift の ISSN
          issn = "0018-2613"
          
          # 学術論文のグローバルデータベース「Crossref」のAPIを使用
          url = f"https://api.crossref.org/journals/{issn}/works"
          params = {
              "sort": "published",
              "order": "desc",
              "select": "volume,issue,published",
              "rows": 20  # 最新20件の記事データを取得
          }
          headers = {
              "User-Agent": "GitHubActions-JournalChecker/1.0"
          }
          
          print("Crossref APIにアクセスして最新号のデータを取得中...")
          try:
              response = requests.get(url, params=params, headers=headers, timeout=15)
              response.raise_for_status()
              data = response.json()
          except Exception as e:
              print(f"通信エラー: {e}")
              sys.exit(1)
              
          items = data.get("message", {}).get("items", [])
          latest_issue = None
          
          # 取得した記事の中から、VolumeとIssueの番号が両方ある最新のものを探す
          for item in items:
              vol = item.get("volume")
              iss = item.get("issue")
              if vol and iss:
                  latest_issue = f"Volume {vol}: Issue {iss}"
                  break
                  
          if latest_issue:
              print(f"DEBUG: Extracted text is [{latest_issue}]")
              
              # GitHub Actionsの環境変数に書き込む
              env_file = os.getenv('GITHUB_ENV')
              with open(env_file, "a") as f:
                  f.write(f"CURRENT_ISSUE={latest_issue}\n")
          else:
              print("エラー：Crossrefデータベースから巻号情報が見つかりませんでした。")
              sys.exit(1)
          EOF
          
          python check_issue.py

      - name: Compare and Save Status
        run: |
          if [ -f last_issue.txt ]; then
            LAST_ISSUE=$(cat last_issue.txt)
            if [ "$CURRENT_ISSUE" != "$LAST_ISSUE" ]; then
              echo "CHANGED=true" >> $GITHUB_ENV
            fi
          fi
          echo "$CURRENT_ISSUE" > last_issue.txt

      - name: Update last_issue.txt in Repository
        if: env.CHANGED == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "action@github.com"
          git add last_issue.txt
          git commit -m "Update journal issue to $CURRENT_ISSUE"
          git push

      - name: Create Summary
        if: env.CHANGED == 'true'
        run: |
          echo "### 📢 雑誌の更新を検知しました！" >> $GITHUB_STEP_SUMMARY
          echo "- **対象:** Historische Zeitschrift" >> $GITHUB_STEP_SUMMARY
          echo "- **最新号:** $CURRENT_ISSUE" >> $GITHUB_STEP_SUMMARY
          echo "- [サイトを確認する](https://www.degruyterbrill.com/journal/key/hzhz/html)" >> $GITHUB_STEP_SUMMARY

      - name: Notify via Email (Force Fail)
        if: env.CHANGED == 'true'
        run: |
          echo "【通知】最新刊が更新されました！最新号: $CURRENT_ISSUE"
          exit 1
