name: Journal Update Checker (Python Version)

on:
  schedule:
    - cron: '0 0 1 1,4,7,10 *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: pip install beautifulsoup4 requests

      - name: Check Journal Issue with Python
        id: check_site
        run: |
          cat << 'EOF' > check_issue.py
          import requests
          from bs4 import BeautifulSoup
          import re
          import sys
          import os

          url = "https://www.degruyterbrill.com/journal/key/hzhz/html"
          headers = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36",
              "Accept-Language": "en-US,en;q=0.9"
          }
          
          print(f"アクセス中: {url}")
          try:
              response = requests.get(url, headers=headers, timeout=15)
          except requests.exceptions.RequestException as e:
              print(f"通信エラー: {e}")
              sys.exit(1)
              
          if response.status_code != 200:
              print(f"エラー: ステータスコード {response.status_code}")
              sys.exit(1)
              
          # BeautifulSoupでHTMLタグをすべて取り除き、プレーンテキストにする
          soup = BeautifulSoup(response.text, "html.parser")
          clean_text = soup.get_text(separator=' ')
          
          # Volume X Issue Y のパターンを探す（大文字小文字を区別しない）
          match = re.search(r'Volume\s+\d+.*?Issue\s+\d+', clean_text, re.IGNORECASE)
          
          if match:
              issue_text = match.group(0).strip()
              print(f"DEBUG: Extracted text is [{issue_text}]")
              
              # GitHub Actionsの環境変数に書き込む
              env_file = os.getenv('GITHUB_ENV')
              with open(env_file, "a") as f:
                  f.write(f"CURRENT_ISSUE={issue_text}\n")
          else:
              print("エラー：巻号情報が見つかりませんでした。")
              print("--- 取得したサイトテキストの冒頭1000文字を出力します ---")
              print(clean_text[:1000])
              sys.exit(1)
          EOF
          
          python check_issue.py

      - name: Compare and Save Status
        run: |
          if [ -f last_issue.txt ]; then
            LAST_ISSUE=$(cat last_issue.txt)
            if [ "$CURRENT_ISSUE" != "$LAST_ISSUE" ]; then
              echo "CHANGED=true" >> $GITHUB_ENV
            fi
          fi
          echo "$CURRENT_ISSUE" > last_issue.txt

      - name: Update last_issue.txt in Repository
        if: env.CHANGED == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "action@github.com"
          git add last_issue.txt
          git commit -m "Update journal issue to $CURRENT_ISSUE"
          git push

      - name: Create Summary
        if: env.CHANGED == 'true'
        run: |
          echo "### 📢 雑誌の更新を検知しました！" >> $GITHUB_STEP_SUMMARY
          echo "- **対象:** Historische Zeitschrift" >> $GITHUB_STEP_SUMMARY
          echo "- **最新号:** $CURRENT_ISSUE" >> $GITHUB_STEP_SUMMARY

      - name: Notify via Email (Force Fail)
        if: env.CHANGED == 'true'
        run: |
          echo "【通知】最新刊が更新されました！最新号: $CURRENT_ISSUE"
          exit 1
