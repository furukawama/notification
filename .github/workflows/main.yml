name: Multiple Journals Update Checker

on:
  schedule:
    - cron: '0 0 1 1,4,7,10 *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: pip install requests

      - name: Check Journals via Crossref API
        id: check_site
        run: |
          cat << 'EOF' > check_issues.py
          import requests
          import sys
          import os
          import json
          import time

          journals = {
              "0018-2613": "Historische Zeitschrift",
              "0031-2746": "Past & Present",
              "0071-9706": "Frühmittelalterliche Studien",
              "1615-7885": "Europa im Mittelalter",
              "0452-490X": "Vorträge und Forschungen"
          }

          state_file = "last_issues.json"
          
          if os.path.exists(state_file):
              with open(state_file, "r", encoding="utf-8") as f:
                  try:
                      last_state = json.load(f)
                  except:
                      last_state = {}
          else:
              last_state = {}

          new_state = {}
          updates = []

          headers = {"User-Agent": "GitHubActions-JournalChecker/1.0"}
          
          for issn, title in journals.items():
              url = "https://api.crossref.org/works"
              params = {"filter": f"issn:{issn}", "sort": "published", "order": "desc", "select": "volume,issue,title", "rows": 5}
              
              try:
                  response = requests.get(url, params=params, headers=headers, timeout=15)
                  response.raise_for_status()
                  items = response.json().get("message", {}).get("items", [])
                  
                  latest_issue = None
                  if items:
                      item = items[0]
                      vol = item.get("volume")
                      iss = item.get("issue")
                      title_list = item.get("title", [])
                      item_title = title_list[0] if title_list else "No Title"
                      
                      if vol and iss:
                          latest_issue = f"Volume {vol}: Issue {iss}"
                      elif vol:
                          latest_issue = f"Volume {vol}"
                      else:
                          short_title = item_title[:60] + "..." if len(item_title) > 60 else item_title
                          latest_issue = f"最新論文/書籍: {short_title}"
                  
                  if latest_issue:
                      new_state[issn] = latest_issue
                      if last_state.get(issn) != latest_issue:
                          updates.append((title, issn, latest_issue))
                  else:
                      new_state[issn] = "データなし"
                      
              except Exception as e:
                  new_state[issn] = f"取得エラー"
              time.sleep(1)

          with open(state_file, "w", encoding="utf-8") as f:
              json.dump(new_state, f, ensure_ascii=False, indent=2)

          # 結果を環境変数とサマリーに書き込む
          summary_file = os.getenv('GITHUB_STEP_SUMMARY')
          with open(summary_file, "a", encoding="utf-8") as f:
              f.write("### 📚 監視ジャーナル・叢書 最新ステータス\n\n")
              
              if updates:
                  env_file = os.getenv('GITHUB_ENV')
                  with open(env_file, "a", encoding="utf-8") as env_f:
                      env_f.write("CHANGED=true\n")
                      
                  f.write("#### 📢 以下の更新を検知しました！\n")
                  for title, issn, new in updates:
                      f.write(f"- **{title}** (`{issn}`)\n  - 新着: {new}\n")
                  f.write("\n---\n")
              else:
                  f.write("*今回は新しい更新はありませんでした。*\n\n---\n")
                  
              f.write("#### 🔍 全5誌の現在の取得状況\n")
              for issn, title in journals.items():
                  current = new_state.get(issn, "Unknown")
                  mark = "🆕" if any(u[1] == issn for u in updates) else "✔️"
                  if current == "データなし" or current == "取得エラー": mark = "⚠️"
                  f.write(f"- {mark} **{title}**: {current}\n")
          EOF
          
          python check_issues.py

      - name: Update Repository
        if: env.CHANGED == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "action@github.com"
          git add last_issues.json
          git commit -m "Update multiple journal issues"
          git push

      - name: Notify via Email (Force Fail)
        if: env.CHANGED == 'true'
        run: |
          echo "【通知】登録している学術誌・叢書の最新刊が更新されました！"
          exit 1
