name: Multiple Journals Update Checker

on:
  schedule:
    - cron: '0 0 1 1,4,7,10 *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: pip install requests

      - name: Check Journals via Crossref API
        id: check_site
        run: |
          cat << 'EOF' > check_issues.py
          import requests
          import sys
          import os
          import json
          import time

          journals = {
              "0018-2613": "Historische Zeitschrift",
              "0031-2746": "Past & Present",
              "0071-9706": "Frühmittelalterliche Studien",
              "1615-7885": "Europa im Mittelalter",
              "0452-490X": "Vorträge und Forschungen"
          }

          state_file = "last_issues.json"
          
          if os.path.exists(state_file):
              with open(state_file, "r", encoding="utf-8") as f:
                  try:
                      last_state = json.load(f)
                  except:
                      last_state = {}
          else:
              last_state = {}

          new_state = {}
          updates = []

          headers = {"User-Agent": "GitHubActions-JournalChecker/1.0"}

          print("Crossref APIから各雑誌・叢書の最新データを取得します...\n")
          
          for issn, title in journals.items():
              print(f"■ {title} (ISSN: {issn}) を確認中...")
              
              # 変更点：雑誌専用ルートではなく、全体からISSNで絞り込むルートを使用
              url = "https://api.crossref.org/works"
              params = {
                  "filter": f"issn:{issn}",
                  "sort": "published",
                  "order": "desc",
                  "select": "volume,issue,title,type",
                  "rows": 10
              }
              
              try:
                  response = requests.get(url, params=params, headers=headers, timeout=15)
                  response.raise_for_status()
                  data = response.json()
                  items = data.get("message", {}).get("items", [])
                  
                  latest_issue = None
                  
                  if items:
                      # 最新のデータ1件目を基準にする
                      item = items[0]
                      vol = item.get("volume")
                      iss = item.get("issue")
                      title_list = item.get("title", [])
                      item_title = title_list[0] if title_list else "No Title"
                      
                      if vol and iss:
                          latest_issue = f"Volume {vol}: Issue {iss}"
                      elif vol:
                          latest_issue = f"Volume {vol}"
                      else:
                          # 巻号がない論文集の場合は、タイトルの冒頭60文字を最新情報として扱う
                          short_title = item_title[:60] + "..." if len(item_title) > 60 else item_title
                          latest_issue = f"最新刊: {short_title}"
                  
                  if latest_issue:
                      new_state[issn] = latest_issue
                      old_issue = last_state.get(issn)
                      
                      if old_issue != latest_issue:
                          updates.append((title, issn, latest_issue))
                          print(f"  -> 💡 更新あり: {latest_issue}")
                      else:
                          print(f"  -> 変更なし: {latest_issue}")
                  else:
                      new_state[issn] = last_state.get(issn, "Unknown")
                      print("  -> データが見つかりませんでした")
                      
              except Exception as e:
                  print(f"  -> ❌ エラー: {e}")
                  new_state[issn] = last_state.get(issn, "Error")
                  
              time.sleep(1) # サーバー負荷軽減

          with open(state_file, "w", encoding="utf-8") as f:
              json.dump(new_state, f, ensure_ascii=False, indent=2)

          if updates:
              env_file = os.getenv('GITHUB_ENV')
              with open(env_file, "a", encoding="utf-8") as f:
                  f.write("CHANGED=true\n")
                  
              summary_file = os.getenv('GITHUB_STEP_SUMMARY')
              with open(summary_file, "a", encoding="utf-8") as f:
                  f.write("### 📢 雑誌・叢書の更新を検知しました！\n\n")
                  for title, issn, new in updates:
                      f.write(f"- **{title}** (ISSN: `{issn}`)\n")
                      f.write(f"  - {new}\n")
          EOF
          
          python check_issues.py

      - name: Update Repository
        if: env.CHANGED == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "action@github.com"
          git add last_issues.json
          git commit -m "Update multiple journal issues"
          git push

      - name: Notify via Email (Force Fail)
        if: env.CHANGED == 'true'
        run: |
          echo "【通知】登録している学術誌・叢書の最新刊が更新されました！"
          exit 1
